[pytest]
# Browser E2E tests share one Streamlit process; occasional session-setup
# delays cause intermittent timeouts.  One retry eliminates the flakiness
# without masking real failures (a genuine bug fails on every attempt).
addopts = --reruns 1 --reruns-delay 1 --timeout=90

# Per-test timeout: unit tests finish in <2 s; Playwright tests need up to ~60 s
# (30 s search wait + 20 s breakdown wait + overhead).  90 s gives headroom
# while ensuring a hung test is killed quickly and named clearly in the output.
